<!DOCTYPE html>
<html>
<head>
  <title>Socket.IO Test</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    button { padding: 10px 20px; margin: 5px; font-size: 16px; }
    pre { background: #f4f4f4; padding: 10px; border-radius: 5px; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>Socket.IO Backend Test</h1>
  
  <h2>Connection Status</h2>
  <div id="status">Disconnected</div>
  
  <h2>Test: Get All Sessions</h2>
  <button onclick="getSessions()">Get Sessions</button>
  
  <h2>Test: Add Session</h2>
  <button onclick="addSession()">Add Session</button>
  
  <h2>Test: Add Driver</h2>
  <label>Session ID: <input id="sessionId" type="number" value="1"></label><br>
  <label>Driver Name: <input id="driverName" type="text" value="Alice"></label><br>
  <button onclick="addDriver()">Add Driver</button>
  
  <h2>Test: Remove Driver</h2>
  <label>Session ID: <input id="removeSessionId" type="number" value="1"></label><br>
  <label>Driver Name: <input id="removeDriverName" type="text" value="Alice"></label><br>
  <button onclick="removeDriver()">Remove Driver</button>
  
  <h2>Test: Remove Session</h2>
  <label>Session ID: <input id="deleteSessionId" type="number" value="1"></label><br>
  <button onclick="removeSession()">Remove Session</button>
  
  <h3>Response:</h3>
  <pre id="output">Click button to test...</pre>
  
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io()
    const statusDiv = document.getElementById('status')
    const outputDiv = document.getElementById('output')
    
    socket.on('connect', () => {
      statusDiv.innerHTML = '<span class="success">✓ Connected</span>'
      console.log('Connected:', socket.id)
    })
    
    socket.on('disconnect', () => {
      statusDiv.innerHTML = '<span class="error">✗ Disconnected</span>'
    })
    
    function getSessions() {
      socket.emit('getSessions', (response) => {
        outputDiv.textContent = JSON.stringify(response, null, 2)
      })
    }
    
    function addSession() {
      socket.emit('session:add', (response) => {
        outputDiv.textContent = JSON.stringify(response, null, 2)
      })
    }
    
    function addDriver() {
      const sessionId = parseInt(document.getElementById('sessionId').value)
      const driverName = document.getElementById('driverName').value
      
      socket.emit('driver:add', { sessionId, driverName }, (response) => {
        outputDiv.textContent = JSON.stringify(response, null, 2)
      })
    }
    
    function removeDriver() {
      const sessionId = parseInt(document.getElementById('removeSessionId').value)
      const driverName = document.getElementById('removeDriverName').value
      
      socket.emit('driver:remove', { sessionId, driverName }, (response) => {
        outputDiv.textContent = JSON.stringify(response, null, 2)
      })
    }
    
    function removeSession() {
      const sessionId = parseInt(document.getElementById('deleteSessionId').value)
      
      socket.emit('session:remove', { sessionId }, (response) => {
        outputDiv.textContent = JSON.stringify(response, null, 2)
      })
    }
  </script>
</body>
</html>
