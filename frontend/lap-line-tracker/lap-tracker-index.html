<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lap-line Tracker</title>
    <link rel="stylesheet" href="/frontend/shared/lock-screen.css">
    <link rel="stylesheet" href="/frontend/lap-line-tracker/lap-tracker-style.css">
</head>

<body class="dark">

    <!-- Lock Screen for Authentication -->
    <section id="lock-screen">
        <h1>Lap-line observer</h1>
        <form id="key-form">
            <input id="access-key" class="input1" type="password" placeholder="Enter access key" autocomplete="off" />
            <button id="unlock-btn" class="button1" type="submit">Unlock</button>
        </form>
        <p class="error1" id="error-message"></p>
    </section>

    <!-- Lap Tracker Panel (hidden until authenticated) -->
    <div id="lap-tracker-panel" hidden>

        <h2>Lap-line Tracker</h2>
        <p class="instruction">Tap car number as it crosses the lap line</p>
        <div id="tracker-state-message" class="tracker-state"></div>

        <div id="car-buttons">
        </div>

        <div id="lap-feedback"></div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/frontend/lap-line-tracker/lap-tracker.js"></script>
</body>

</html>
