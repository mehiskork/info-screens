<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lap-line Tracker</title>
    <link rel="stylesheet" href="/frontend/lap-line-tracker/lap-tracker-style.css">
</head>

<body class="dark">

    <!-- Lock Screen for Authentication -->
    <div id="lock-screen">
        <div class="lock-panel">
            <h2>Observer Authentication</h2>
            <form id="auth-form">
                <input type="password" id="access-key" placeholder="Enter Observer Key" autocomplete="off" />
                <button id="unlock-btn" type="submit">Unlock</button>
            </form>
            <p id="error-message" class="error"></p>
        </div>
    </div>

    <!-- Lap Tracker Panel (hidden until authenticated) -->
    <div id="lap-tracker-panel" hidden>

        <h2>Lap-line Tracker</h2>
        <p class="instruction">Tap car number as it crosses the lap line</p>
        <div id="tracker-state-message" class="tracker-state"></div>

        <div id="car-buttons">
        </div>

        <div id="lap-feedback"></div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/frontend/lap-line-tracker/lap-tracker.js"></script>
</body>

</html>
