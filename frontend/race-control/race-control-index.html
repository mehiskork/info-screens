<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Race Control</title>
    <link rel="stylesheet" href="/frontend/race-control/race-control-style.css">
</head>

<body class="dark">



    <!-- Race Control Panel (hidden until authenticated) -->

    <div id="lock-screen">
        <div class="lock-panel">
            <h2>Safety official authentication</h2>
            <form id="auth-form">
                <input type="password" id="access-key" placeholder="Enter access Key" />
                <button id="unlock-btn" class="button1" type="submit">Unlock</button>
            </form>
            <p id="error-message" class="error"></p>
        </div>
    </div>

    <!-- Race Control Panel -->
    <div id="race-panel" style="display:none;">
        <h2>Race Control</h2>

        <div class="top-row">
            <div id="race-status">---</div>
            <div id="mini-timer">00:00:00</div>
        </div>

        <div class="main-action">
            <button id="start" class="button1">Start Race</button>
            <button id="end-session" class="button1">End Session</button>
        </div>

        <div class="mode-buttons">
            <button id="safe" class="button1 safe">SAFE</button>
            <button id="hazard" class="button1 hazard">HAZARD</button>
            <button id="danger" class="button1 danger">DANGER</button>
            <button id="finish" class="button1 finish">FINISH</button>
        </div>





        <div id="next-race">
            <div id="next-race-title">Next: ---</div>
            <div id="next-race-list"></div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/frontend/race-control/race-control.js"></script>

</body>

</html>
