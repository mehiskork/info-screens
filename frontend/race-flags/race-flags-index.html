<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Race Flags</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 140px;
            font-family: Arial;
            color: white;
        }

        /* moving background pattern */
        @keyframes moveFlag {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 200px 200px;
            }
        }

        /* flashing hazard */
        @keyframes flash {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        /* pulsing danger */
        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>

</head>

<body id="screen">

    SAFE

    <script src="/socket.io/socket.io.js"></script>
    <script src="race-flags.js"></script>

</body>

</html>

</html>
